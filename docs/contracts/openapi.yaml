openapi: 3.1.0
info:
  title: Ecossistema Whats API
  version: 0.1.0
servers:
  - url: https://ecossistemawhats.vercel.app
paths:
  /api/health:
    get:
      summary: Healthcheck
      responses:
        "200":
          description: Service status
  /api/events:
    get:
      summary: Dashboard data
      security:
        - basicAuth: []
      responses:
        "200":
          description: Aggregated dashboard data
  /api/webhooks/{source}:
    post:
      summary: Ingest canonical event
      parameters:
        - name: source
          in: path
          required: true
          schema:
            type: string
            enum: [webflow, fireflies, carta, openclaw, whatsapp, injetaveis, vercel]
      security:
        - bearerAuth: []
        - webflowSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./event-envelope.schema.json
      responses:
        "202":
          description: Event accepted
        "401":
          description: Invalid signature or token
  /api/messages/send:
    post:
      summary: Send message through OpenClaw/WhatsApp hub
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                to:
                  type: string
                message:
                  type: string
      responses:
        "202":
          description: Message queued
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
    webflowSignature:
      type: apiKey
      in: header
      name: x-webflow-signature
